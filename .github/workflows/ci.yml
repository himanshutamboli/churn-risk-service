name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t churn-risk-service:ci .

      - name: Run container
        run: docker run -d -p 8000:8000 --name churn churn-risk-service:ci

      - name: Smoke test /health and /predict
        run: |
          for i in $(seq 1 30); do
            curl -sf localhost:8000/health && break || sleep 1
          done
          curl -sf localhost:8000/health
          curl -sf localhost:8000/predict \
            -H 'content-type: application/json' \
            -d @examples/request.json

      - name: Container logs (always)
        if: always()
        run: docker logs churn
